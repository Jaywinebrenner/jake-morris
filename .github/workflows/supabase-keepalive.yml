name: Supabase Keepalive

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * *"

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase Auth Health Endpoint
        env:
          SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
        run: |
          curl -sS "${SUPABASE_URL}/auth/v1/health" > /dev/null